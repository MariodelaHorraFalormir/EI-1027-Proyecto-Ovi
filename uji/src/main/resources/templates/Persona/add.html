<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Añadir Persona</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body>
<main class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h2 class="h4 mb-0">Añadir Nueva Persona</h2>
        </div>
        <div class="card-body">
            <form action="#" th:action="@{/persona/add}" th:object="${persona}" method="post">
                <div class="row">
                    <div class="col-md-2 mb-3">
                        <label class="form-label fw-bold">ID</label>
                        <input type="number" class="form-control" th:field="*{idPersona}" required />
                    </div>
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{mail}" required />
                    </div>
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Apellidos</label>
                        <input type="text" class="form-control" th:field="*{apellidos}" />
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Año de Nacimiento</label>
                        <input type="number" class="form-control" th:field="*{edad}" placeholder="Ej. 1999" required />
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Género</label>
                        <select class="form-control" th:field="*{genero}">
                            <option value="Hombre">Hombre</option>
                            <option value="Mujer">Mujer</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>                    <div class="col-md-6 mb-3">
                        <label class="form-label">Dirección</label>
                        <input type="text" class="form-control" th:field="*{direccion}" />
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">País</label>
                        <input type="text" class="form-control" th:field="*{pais}" />
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" th:field="*{telefono}" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha Alta</label>
                        <input type="date" class="form-control" th:field="*{fechaAlta}" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha Baja</label>
                        <input type="date" class="form-control" th:field="*{fechaBaja}" />
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-success">Guardar Persona</button>
                    <a th:href="@{/persona/listId}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
