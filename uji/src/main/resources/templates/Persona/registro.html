<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de persona</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>

    <style>
        body {
            background: linear-gradient(135deg, #f4f7fb, #e9f0f8);
            min-height: 100vh;
        }

        .edit-card {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.08);
            padding: 2rem;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1f3b5b;
            margin-bottom: 0.3rem;
        }

        .section-subtitle {
            color: #6c757d;
            margin-bottom: 2rem;
        }

        .block-card {
            background: #f8fafc;
            border: 1px solid #e9eef5;
            border-radius: 18px;
            padding: 1.4rem;
            margin-bottom: 1.5rem;
        }

        .block-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1f3b5b;
            margin-bottom: 1.2rem;
        }

        .data-label {
            font-weight: 600;
            color: #1f3b5b;
            margin-bottom: 0.45rem;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 0.75rem 0.95rem;
            border: 1px solid #d8e0ea;
            background-color: #fff;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #7aa7d9;
            box-shadow: 0 0 0 0.2rem rgba(58, 123, 213, 0.12);
        }

        .role-badge {
            display: inline-block;
            background: #6c7a89;
            color: white;
            font-weight: 600;
            border-radius: 999px;
            padding: 0.45rem 0.85rem;
            font-size: 0.9rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
        }

        .actions {
            margin-top: 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            border-radius: 12px;
            padding: 0.7rem 1.15rem;
            font-weight: 600;
        }

        .btn-primary {
            background-color: #1f4e79;
            border-color: #1f4e79;
        }

        .btn-primary:hover {
            background-color: #193f63;
            border-color: #193f63;
        }

        .btn-outline-secondary:hover {
            background-color: #6c757d;
            color: white;
        }

        .text-muted-small {
            font-size: 0.92rem;
            color: #6c757d;
        }

        .alert {
            border-radius: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="edit-card">

        <div class="top-bar">
            <div>
                <h1 class="section-title">Registro de persona</h1>
                <p class="section-subtitle mb-0">
                    Completa los datos para darte de alta en la plataforma OVI
                </p>
            </div>

            <span class="role-badge">Nueva alta</span>
        </div>

        <div th:if="${errorMail}" class="alert alert-danger" th:text="${errorMail}"></div>

        <form th:object="${persona}" method="post" th:action="@{/Persona/registro}">

            <!-- DATOS PERSONALES -->
            <div class="block-card">
                <div class="block-title">Datos personales</div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="data-label" for="nombre">Nombre</label>
                        <input type="text" id="nombre" class="form-control"
                               th:field="*{nombre}" placeholder="Introduce el nombre" required>
                    </div>

                    <div class="col-md-6">
                        <label class="data-label" for="apellidos">Apellidos</label>
                        <input type="text" id="apellidos" class="form-control"
                               th:field="*{apellidos}" placeholder="Introduce los apellidos" required>
                    </div>

                    <div class="col-md-6">
                        <label class="data-label" for="mail">Correo electrónico</label>
                        <input type="email" id="mail" class="form-control"
                               th:field="*{mail}" placeholder="correo@ejemplo.com" required>
                    </div>

                    <div class="col-md-6">
                        <label class="data-label" for="telefono">Teléfono</label>
                        <input type="text" id="telefono" class="form-control"
                               th:field="*{telefono}" placeholder="600123123" required>
                    </div>

                    <div class="col-md-4">
                        <label class="data-label" for="dni">DNI</label>
                        <input type="text" id="dni" class="form-control"
                               th:field="*{dni}" placeholder="12345678A" required>
                    </div>

                    <div class="col-md-4">
                        <label class="data-label" for="pais">País</label>
                        <input type="text" id="pais" class="form-control"
                               th:field="*{pais}" placeholder="España" required>
                    </div>

                    <div class="col-md-4">
                        <label class="data-label" for="genero">Género</label>
                        <select id="genero" class="form-select" th:field="*{genero}" required>
                            <option value="">Selecciona una opción</option>
                            <option value="Hombre">Hombre</option>
                            <option value="Mujer">Mujer</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <div class="col-md-8">
                        <label class="data-label" for="direccion">Dirección</label>
                        <input type="text" id="direccion" class="form-control"
                               th:field="*{direccion}" placeholder="Calle, número, piso..." required>
                    </div>

                    <div class="col-md-4">
                        <label class="data-label" for="fechaNacimiento">Fecha de nacimiento</label>
                        <input type="date" id="fechaNacimiento" class="form-control"
                               th:field="*{fechaNacimiento}" required>
                    </div>
                </div>
            </div>

            <!-- ACCESO -->
            <div class="block-card">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <div class="block-title mb-0">Acceso a la plataforma</div>
                    <span class="role-badge">Cuenta</span>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="data-label" for="contrasena">Contraseña</label>
                        <input type="password" id="contrasena" class="form-control"
                               th:field="*{contrasena}" placeholder="Introduce una contraseña" required>
                    </div>

                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Registrarme</button>
                <a th:href="@{/}" class="btn btn-secondary">Volver al inicio</a>
                <a th:href="@{/Persona/listId}" class="btn btn-outline-secondary">Ver personas</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
