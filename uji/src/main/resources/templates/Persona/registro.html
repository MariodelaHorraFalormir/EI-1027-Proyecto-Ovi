<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro OVI</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <h1 class="mb-4 text-center">Registro en la OVI</h1>

            <div th:if="${errorMail}" class="alert alert-danger" th:text="${errorMail}"></div>

            <form th:action="@{/Persona/registro}" th:object="${registroForm}" method="post">

                <!-- CARD DATOS PERSONALES -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header">
                        Datos personales
                    </div>
                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{persona.nombre}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Apellidos</label>
                            <input type="text" class="form-control" th:field="*{persona.apellidos}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" th:field="*{persona.mail}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" th:field="*{persona.telefono}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <input type="text" class="form-control" th:field="*{persona.direccion}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">País</label>
                            <input type="text" class="form-control" th:field="*{persona.pais}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha de nacimiento</label>
                            <input type="date" class="form-control" th:field="*{persona.fechaNacimiento}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Género</label>
                            <select class="form-select" th:field="*{persona.genero}" required>
                                <option value="">Selecciona una opción</option>
                                <option value="Hombre">Hombre</option>
                                <option value="Mujer">Mujer</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>

                    </div>
                </div>

                <!-- CARD DATOS OVI USER -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header">
                        Datos del rol OVI user
                    </div>
                    <div class="card-body">

                        <p class="text-muted mb-3">
                            Al completar este registro se creará tu perfil como usuario de la OVI.
                        </p>

                        <!--
                        Si en el futuro OviUser tiene más campos, irían aquí.
                        Ejemplo:
                        <div class="mb-3">
                            <label class="form-label">Disponibilidad</label>
                            <select class="form-select" th:field="*{oviUser.disponibilidad}">
                                <option value="">Selecciona una opción</option>
                                <option value="Total">Total</option>
                                <option value="Parcial">Parcial</option>
                                <option value="No_disponible">No disponible</option>
                            </select>
                        </div>
                        -->

                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Registrarme
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
