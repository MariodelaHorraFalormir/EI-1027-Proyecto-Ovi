<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Gestionar Personas</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <!-- Pongo aqui el estilo temporalmente para poder trabajar con ello  -->
    <style>
        .tabla-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 70vh;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .tabla-personas {
            min-width: 1400px;
            margin-bottom: 0;
        }

        .tabla-personas thead th {
            position: sticky;
            top: 0;
            background: white;
            z-index: 2;
        }

        .no-wrap {
            white-space: nowrap;
        }

        .col-mail {
            min-width: 220px;
        }

        .col-direccion {
            min-width: 180px;
        }

        .col-apellidos {
            min-width: 170px;
        }
    </style>
</head>
<body>
<main class="container-fluid mt-4 px-4">
    <h1>Personas registradas por ID</h1>

    <div class="tabla-wrapper mt-3">
        <table class="table table-striped table-hover align-middle tabla-personas">
            <thead>
            <tr>
                <th class="no-wrap">ID</th>
                <th class="no-wrap col-mail">Mail</th>
                <th class="no-wrap">Nombre</th>
                <th class="no-wrap col-apellidos">Apellidos</th>
                <th class="no-wrap">Edad</th>
                <th class="no-wrap">Género</th>
                <th class="no-wrap col-direccion">Dirección</th>
                <th class="no-wrap">País</th>
                <th class="no-wrap">Teléfono</th>
                <th class="no-wrap">Fecha Alta</th>
                <th class="no-wrap">Fecha Baja</th>
                <th class="no-wrap">Editar</th>
                <th class="no-wrap">Borrar</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="persona : ${personasOrderId}">
                <td th:text="${persona.idPersona}"></td>
                <td th:text="${persona.mail}"></td>
                <td th:text="${persona.nombre}"></td>
                <td th:text="${persona.apellidos}"></td>
                <td th:text="${persona.edad}"></td>
                <td th:text="${persona.genero}"></td>
                <td th:text="${persona.direccion}"></td>
                <td th:text="${persona.pais}"></td>
                <td class="no-wrap" th:text="${persona.telefono}"></td>

                <td class="no-wrap"
                    th:text="${persona.fechaAlta != null ? #temporals.format(persona.fechaAlta, 'dd/MM/yyyy') : '-'}">
                </td>

                <td class="no-wrap"
                    th:text="${persona.fechaBaja != null ? #temporals.format(persona.fechaBaja, 'dd/MM/yyyy') : '-'}">
                </td>

                <td class="no-wrap">
                    <a th:href="@{/Persona/update/{id}(id=${persona.idPersona})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>
                </td>
                <td class="no-wrap">
                    <a th:href="@{/Persona/delete/{id}(id=${persona.idPersona})}"
                       class="btn btn-danger btn-sm">
                        Borrar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <a th:href="@{/Persona/registro}" class="btn btn-success">Añadir nueva persona</a>
        <a href="/" class="btn btn-secondary">Tornar</a>
    </div>
</main>
</body>
</html>
