<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Gestionar Nadadors</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body>
<main class="container">
    <h1>Personas registradas por ID</h1>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Mail</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Edad</th>
            <th>Genero</th>
            <th>Direcion </th>
            <th>Pais</th>
            <th>Telefono</th>
            <th>Fecha Alta</th>
            <th> Fecha Baja </th>

            <td></td>
            <td></td>
        </tr>
        </thead>
        <tbody>
        <tr th:each="persona: ${personasOrderId}">
            <td th:text="${persona.idPersona}"></td>
            <td th:text="${persona.mail}"></td>
            <td th:text="${persona.nombre}"></td>
            <td th:text="${persona.apellidos}"></td>
            <td th:text="${persona.edad}"></td>
            <td th:text="${persona.genero}"></td>
            <td th:text="${persona.direccion}"></td>
            <td th:text="${persona.pais}"></td>
            <td th:text="${persona.telefono}"></td>
            <td th:text="${persona.fechaAlta}"></td>
            <td th:text="${persona.fechaBaja}"></td>
            <td><a th:href="@{/Persona/delete/{id}(id=${persona.idPersona})}">Borrar</a></td>
            <td><a th:href="@{/Persona/update/{id}(id=${persona.idPersona})}">Editar</a></td>

        </tr>
        </tbody>
    </table>


    <a href="/">Tornar</a>
</main>
</body>
</html>
