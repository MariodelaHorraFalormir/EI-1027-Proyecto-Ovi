<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Gestionar Nadadors</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body>
<main class="container">
    <h1>Personas registradas por ID</h1>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido 1</th>
            <th>Apellido 2</th>
            <th>Mail</th>
            <th>Edad</th>
            <th>Genero</th>
            <th>Telefono</th>
            <td></td>
            <td></td>
        </tr>
        </thead>
        <tbody>
        <tr th:each="persona: ${personasOrderId}">
            <td th:text="${persona.idPersona}"></td>
            <td th:text="${persona.nombre}"></td>
            <td th:text="${persona.apellido1}"></td>
            <td th:text="${persona.apellido2}"></td>
            <td th:text="${persona.email}"></td>
            <td th:text="${persona.edad}"></td>
            <td th:text="${persona.sexo}"></td>
            <td th:text="${persona.telefono}"></td>

        </tr>
        </tbody>
    </table>


    <a href="/">Tornar</a>
</main>
</body>
</html>
