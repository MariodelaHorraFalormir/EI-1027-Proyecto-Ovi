<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Gestionar Personas</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body>
<main class="container mt-4">
    <h1>Personas registradas por ID</h1>

    <div class="mb-3">
        <a th:href="@{/persona/add}" class="btn btn-success">Añadir nueva persona</a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Mail</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Edad</th>
            <th>Género</th>
            <th>Dirección</th>
            <th>País</th>
            <th>Teléfono</th>
            <th>Fecha Alta</th>
            <th>Fecha Baja</th>
            <th>Opciones</th> </tr>
        </thead>
        <tbody>
        <tr th:each="persona: ${personasOrderId}">
            <td th:text="${persona.idPersona}"></td>
            <td th:text="${persona.mail}"></td>
            <td th:text="${persona.nombre}"></td>
            <td th:text="${persona.apellidos}"></td>
            <td th:text="${persona.edad}"></td>
            <td th:text="${persona.genero}"></td>
            <td th:text="${persona.direccion}"></td>
            <td th:text="${persona.pais}"></td>
            <td th:text="${persona.telefono}"></td>
            <td th:text="${persona.fechaAlta}"></td>
            <td th:text="${persona.fechaBaja}"></td>

            <td>
                <a th:href="@{/persona/update/{id}(id=${persona.idPersona})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/persona/delete/{id}(id=${persona.idPersona})}" class="btn btn-danger btn-sm">Borrar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Tornar</a>
</main>
</body>
</html>
