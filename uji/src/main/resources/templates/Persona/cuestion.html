<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Continuar registro</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <h1 class="mb-3">Continuar como usuario</h1>
                    <p class="text-muted mb-4">
                        Has seleccionado un rol. Indica si ya formas parte de la OVI o si necesitas registrarte.
                    </p>

                    <div class="d-grid gap-3">
                        <a th:href="@{/Persona/solicitar-rol-oviuser}" class="btn btn-primary btn-lg">
                            Ya estoy registrado en la OVI
                        </a>

                        <a th:href="@{/Persona/registro}" class="btn btn-outline-secondary btn-lg">
                            No estoy registrado en la OVI
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
