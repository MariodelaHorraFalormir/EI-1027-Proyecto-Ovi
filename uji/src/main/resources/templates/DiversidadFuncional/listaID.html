<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Gestionar Diversidades Por Usuario</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <!-- Pongo aqui el estilo temporalmente para poder trabajar con ello  -->
    <style>
        .tabla-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 70vh;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .tabla-personas {
            min-width: 1400px;
            margin-bottom: 0;
        }

        .tabla-personas thead th {
            position: sticky;
            top: 0;
            background: white;
            z-index: 2;
        }

        .no-wrap {
            white-space: nowrap;
        }

        .col-mail {
            min-width: 220px;
        }

        .col-direccion {
            min-width: 180px;
        }

        .col-apellidos {
            min-width: 170px;
        }
    </style>
</head>
<body>
<main class="container-fluid mt-4 px-4">
    <h1>Diversidades Funcionales por Usuario</h1>

    <div class="tabla-wrapper mt-3">
        <table class="table table-striped table-hover align-middle tabla-personas">
            <thead>
            <tr>
                <th class="no-wrap">ID</th>
                <th class="no-wrap col-mail">ovi_user</th>
                <th class="no-wrap">tipo</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="diversidad : ${diversidades}">
                <td th:text="${diversidad.idDiversidadFuncional}"></td>
                <td th:text="${diversidad.oviUserId}"></td>
                <td th:text="${diversidad.tipo}"></td>

                <td class="no-wrap">
                    <a th:href="@{/DiversidadFuncional/update/{idDiversidad}(idDiversidad=${diversidad.idDiversidadFuncional})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>
                </td>
                <td class="no-wrap">
                    <a th:href="@{/DiversidadFuncional/delete/{idDiversidad}/{idUsuario}
                        (idDiversidad=${diversidad.idDiversidadFuncional}, idUsuario=${id})}"
                       class="btn btn-danger btn-sm">
                        Borrar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <a th:href="@{/DiversidadFuncional/create/{id}(id=${id})}" class="btn btn-success">
            Añadir nueva diversidad
        </a>
        <a href="/" class="btn btn-secondary">Finalizar el proceso</a>
    </div>
</main>
</body>
</html>
