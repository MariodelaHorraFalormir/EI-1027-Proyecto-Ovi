<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Añadir diversidad funcional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>

    <style>
        body {
            background: linear-gradient(135deg, #f4f7fb, #e9f0f8);
            min-height: 100vh;
        }

        .edit-card {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.08);
            padding: 2rem;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1f3b5b;
            margin-bottom: 0.3rem;
        }

        .section-subtitle {
            color: #6c757d;
            margin-bottom: 2rem;
        }

        .block-card {
            background: #f8fafc;
            border: 1px solid #e9eef5;
            border-radius: 18px;
            padding: 1.4rem;
            margin-bottom: 1.5rem;
        }

        .block-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1f3b5b;
            margin-bottom: 1.2rem;
        }

        .data-label {
            font-weight: 600;
            color: #1f3b5b;
            margin-bottom: 0.45rem;
        }

        .form-control,
        .form-select,
        .form-control:focus,
        .form-select:focus {
            border-radius: 12px;
        }

        .form-control,
        .form-select {
            padding: 0.75rem 0.95rem;
            border: 1px solid #d8e0ea;
            background-color: #fff;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #7aa7d9;
            box-shadow: 0 0 0 0.2rem rgba(58, 123, 213, 0.12);
        }

        .role-badge {
            display: inline-block;
            background: #6c7a89;
            color: white;
            font-weight: 600;
            border-radius: 999px;
            padding: 0.45rem 0.85rem;
            font-size: 0.9rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
        }

        .actions {
            margin-top: 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            border-radius: 12px;
            padding: 0.7rem 1.15rem;
            font-weight: 600;
        }

        .btn-primary {
            background-color: #1f4e79;
            border-color: #1f4e79;
        }

        .btn-primary:hover {
            background-color: #193f63;
            border-color: #193f63;
        }

        .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
        }

        .btn-secondary:hover {
            background-color: #5c636a;
            border-color: #5c636a;
        }

        .text-muted-small {
            font-size: 0.92rem;
            color: #6c757d;
        }

        textarea.form-control {
            min-height: 140px;
            resize: vertical;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="edit-card">

        <div class="top-bar">
            <div>
                <h1 class="section-title">Añadir diversidad funcional</h1>
                <p class="section-subtitle mb-0">
                    Indica el tipo de diversidad funcional y añade observaciones si lo consideras necesario
                </p>
            </div>

            <span class="role-badge"
                  th:text="'OviUser ID ' + ${diversidadFuncional.oviUserId}">
                OviUser ID 1
            </span>
        </div>

        <form th:object="${diversidadFuncional}"
              method="post"
              th:action="@{/DiversidadFuncional/create/{id}(id=*{oviUserId})}">

            <!-- ocultos -->
            <input type="hidden" th:field="*{idDiversidadFuncional}">
            <input type="hidden" th:field="*{oviUserId}">

            <div class="block-card">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <div class="block-title mb-0">Datos de la diversidad funcional</div>
                    <span class="role-badge">Diversidad funcional</span>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="data-label" for="tipo">
                            Tipo de diversidad funcional
                        </label>

                        <select id="tipo"
                                class="form-select"
                                th:field="*{tipo}">
                            <option value="">Selecciona una opción</option>
                            <option th:each="opcion : ${listaTipos}"
                                    th:value="${opcion}"
                                    th:text="${opcion}">
                            </option>
                        </select>

                        <div class="text-muted-small mt-2">
                            Selecciona el tipo que mejor describa la situación.
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="data-label" for="observaciones">
                            Observaciones
                        </label>
                        <textarea id="observaciones"
                                  class="form-control"
                                  th:field="*{observaciones}"
                                  placeholder="Añade información complementaria si hace falta..."></textarea>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">
                    Guardar diversidad funcional
                </button>

                <a th:href="@{/OviUser/listaID/{id}(id=*{oviUserId})}"
                   class="btn btn-secondary">
                    Volver
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
