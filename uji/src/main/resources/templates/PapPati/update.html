<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar rol PapPati</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>

    <style>
        body {
            background: linear-gradient(135deg, #f4f7fb, #e9f0f8);
            min-height: 100vh;
        }

        .edit-card {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.08);
            padding: 2rem;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1f3b5b;
        }

        .section-subtitle {
            color: #6c757d;
            margin-bottom: 2rem;
        }

        .block-card {
            background: #f8fafc;
            border: 1px solid #e9eef5;
            border-radius: 18px;
            padding: 1.4rem;
            margin-bottom: 1.5rem;
        }

        .block-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1f3b5b;
            margin-bottom: 1.2rem;
        }

        label {
            font-weight: 600;
            color: #1f3b5b;
            margin-bottom: 0.45rem;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 0.75rem 0.95rem;
            border: 1px solid #d8e0ea;
            background-color: #fff;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #7aa7d9;
            box-shadow: 0 0 0 0.2rem rgba(58, 123, 213, 0.12);
        }

        .role-badge {
            background: #6c7a89;
            color: white;
            border-radius: 999px;
            padding: 0.4rem 0.8rem;
            font-weight: 600;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
        }

        .actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            border-radius: 12px;
            padding: 0.7rem 1.15rem;
            font-weight: 600;
        }

        .btn-primary {
            background-color: #1f4e79;
            border-color: #1f4e79;
        }

        .btn-primary:hover {
            background-color: #193f63;
            border-color: #193f63;
        }
        .status-badge {
            display: inline-block;
            font-weight: 700;
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .status-activo {
            background: #d1fae5;
            color: #065f46;
            border-color: #a7f3d0;
        }

        .status-pendiente {
            background: #fef3c7;
            color: #92400e;
            border-color: #fde68a;
        }

        .status-rechazado {
            background: #fee2e2;
            color: #991b1b;
            border-color: #fecaca;
        }

        .status-sin-estado {
            background: #e5e7eb;
            color: #374151;
            border-color: #d1d5db;
        }

        .status-help-text {
            font-size: 0.88rem;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="edit-card">

        <!-- HEADER -->
        <div class="top-bar">
            <div>
                <h1 class="section-title">Editar rol PapPati</h1>
                <p class="section-subtitle mb-0">
                    Modifica los datos asociados al rol PAP/PATI
                </p>
            </div>

            <!-- ESTADO DEL ROL: SOLO LECTURA -->
            <div class="d-flex flex-column align-items-md-end gap-2">

                

                <div th:switch="${papPati.estadoRol != null ? papPati.estadoRol.name() : 'SinEstado'}">

            <span th:case="'Activo'"
                  class="status-badge status-activo">
                Rol activo
            </span>

                    <span th:case="'Pendiente'"
                          class="status-badge status-pendiente">
                Rol pendiente
            </span>

                    <span th:case="'Rechazado'"
                          class="status-badge status-rechazado">
                Rol rechazado
            </span>

                    <span th:case="*"
                          class="status-badge status-sin-estado">
                Sin estado
            </span>

                </div>

                <span class="status-help-text">
            Solo lectura
        </span>

            </div>
        </div>

        <form th:object="${papPati}"
              method="post"
              th:action="@{/PapPati/update/{id}(id=${papPati.idPatPati})}">

            <!-- OCULTO -->
            <input type="hidden" th:field="*{idPatPati}">

            <!-- DATOS PAP PATI -->
            <div class="block-card">
                <div class="block-title">Datos del rol</div>

                <div class="row g-3">

                    <div class="col-md-6">
                        <label for="disponibilidad">Disponibilidad</label>
                        <select id="disponibilidad" class="form-select" th:field="*{disponibilidad}">
                            <option th:each="d : ${T(es.uji.ei1027.ovi.modelo.PapPati.Disponibilidad).values()}"
                                    th:value="${d}"
                                    th:text="${d}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="experiencia">Experiencia</label>
                        <input type="number"
                               id="experiencia"
                               class="form-control"
                               th:field="*{experiencia}"
                               min="0">
                    </div>

                    <div class="col-md-6">
                        <label for="vehiculoPropio">Vehículo propio</label>
                        <select id="vehiculoPropio" class="form-select" th:field="*{vehiculoPropio}">
                            <option th:value="true">Sí</option>
                            <option th:value="false">No</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="carnetConducir">Carnet de conducir</label>
                        <select id="carnetConducir" class="form-select" th:field="*{carnetConducir}">
                            <option th:value="true">Sí</option>
                            <option th:value="false">No</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="fechaInicioDisponibilidad">Fecha inicio disponibilidad</label>
                        <input type="date"
                               id="fechaInicioDisponibilidad"
                               name="fechaInicioDisponibilidad"
                               class="form-control"
                               th:value="${papPati.fechaInicioDisponibilidad != null ? #temporals.format(papPati.fechaInicioDisponibilidad, 'yyyy-MM-dd') : ''}"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label for="fechaFinDisponibilidad">Fecha fin disponibilidad</label>
                        <input type="date"
                               id="fechaFinDisponibilidad"
                               name="fechaFinDisponibilidad"
                               class="form-control"
                               th:value="${papPati.fechaFinDisponibilidad != null ? #temporals.format(papPati.fechaFinDisponibilidad, 'yyyy-MM-dd') : ''}">
                    </div>

                    <div class="col-md-6">
                        <label for="centroSocial">Centro social</label>
                        <input type="text"
                               id="centroSocial"
                               class="form-control"
                               th:field="*{centroSocial}">
                    </div>

                    <div class="col-md-6">
                        <label for="urlCV">URL CV</label>
                        <input type="text"
                               id="urlCV"
                               class="form-control"
                               th:field="*{urlCV}">
                    </div>

                    <div class="col-12">
                        <label for="descripcionPerfil">Descripción del perfil</label>
                        <textarea id="descripcionPerfil"
                                  class="form-control"
                                  rows="4"
                                  th:field="*{descripcionPerfil}">
                        </textarea>
                    </div>

                </div>
            </div>

            <!-- ESPECIALIDADES -->
            <div class="block-card">
                <div class="block-title">Especialidades</div>

                <div class="row">
                    <div class="col-md-4 mb-2"
                         th:each="esp : ${Especialidades}">

                        <div class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="especialidadesSeleccionadas"
                                   th:value="${esp}"
                                   th:checked="${especialidadesSeleccionadas != null and #lists.contains(especialidadesSeleccionadas, esp)}">

                            <label class="form-check-label"
                                   th:text="${esp}">
                                Especialidad
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BOTONES -->
            <div class="actions">
                <button type="submit" class="btn btn-primary">
                    Guardar cambios
                </button>

                <a th:href="@{/Persona/update/{id}(id=${papPati.idPatPati})}"
                   class="btn btn-secondary">
                    Volver a persona
                </a>

                <a th:href="@{/Persona/listId}"
                   class="btn btn-outline-secondary">
                    Volver al listado
                </a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
