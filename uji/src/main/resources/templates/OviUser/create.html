<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitar rol OviUser</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>

    <style>
        body {
            background: linear-gradient(135deg, #f4f7fb, #e9f0f8);
            min-height: 100vh;
        }

        .edit-card {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.08);
            padding: 2rem;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1f3b5b;
            margin-bottom: 0.3rem;
        }

        .section-subtitle {
            color: #6c757d;
            margin-bottom: 2rem;
        }

        .block-card {
            background: #f8fafc;
            border: 1px solid #e9eef5;
            border-radius: 18px;
            padding: 1.4rem;
            margin-bottom: 1.5rem;
        }

        .block-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1f3b5b;
            margin-bottom: 1.2rem;
        }

        .data-label {
            font-weight: 600;
            color: #1f3b5b;
            margin-bottom: 0.45rem;
        }

        .form-control,
        .form-select,
        .form-control:focus,
        .form-select:focus {
            border-radius: 12px;
        }

        .form-control,
        .form-select {
            padding: 0.75rem 0.95rem;
            border: 1px solid #d8e0ea;
            background-color: #fff;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #7aa7d9;
            box-shadow: 0 0 0 0.2rem rgba(58, 123, 213, 0.12);
        }

        .role-badge {
            display: inline-block;
            background: #6c7a89;
            color: white;
            font-weight: 600;
            border-radius: 999px;
            padding: 0.45rem 0.85rem;
            font-size: 0.9rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
        }

        .actions {
            margin-top: 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            border-radius: 12px;
            padding: 0.7rem 1.15rem;
            font-weight: 600;
        }

        .btn-primary {
            background-color: #1f4e79;
            border-color: #1f4e79;
        }

        .btn-primary:hover {
            background-color: #193f63;
            border-color: #193f63;
        }

        .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
        }

        .btn-secondary:hover {
            background-color: #5c636a;
            border-color: #5c636a;
        }

        .btn-outline-secondary:hover {
            background-color: #6c757d;
            color: white;
        }

        .text-muted-small {
            font-size: 0.92rem;
            color: #6c757d;
        }

        textarea.form-control {
            min-height: 140px;
            resize: vertical;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="edit-card">

        <div class="top-bar">
            <div>
                <h1 class="section-title">Solicitud de rol OviUser</h1>
                <p class="section-subtitle mb-0">
                    Completa la información necesaria para solicitar el rol de usuario OVI
                </p>
            </div>

            <span class="role-badge"
                  th:text="'Persona ID ' + ${oviUser.idOviUser}">
                Persona ID 1
            </span>
        </div>

        <form th:object="${oviUser}"
              method="post"
              th:action="@{/OviUser/create/{id}(id=${oviUser.idOviUser})}">

            <!-- ocultos -->
            <input type="hidden" th:field="*{idOviUser}">
            <input type="hidden" name="personaSolicitante" th:value="${solicitud.personaSolicitante}">
            <input type="hidden" name="categoriaSolicitud" th:value="${solicitud.categoriaSolicitud}">
            <input type="hidden" name="tipoSolicitud" th:value="${solicitud.tipoSolicitud}">
            <input type="hidden" name="estadoSolicitud" th:value="${solicitud.estadoSolicitud}">

            <!-- DATOS DEL ROL -->
            <div class="block-card">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <div class="block-title mb-0">Datos del rol OviUser</div>
                    <span class="role-badge">OviUser</span>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="data-label" for="gradoDiversidadFuncional">
                            Grado de diversidad funcional
                        </label>
                        <input type="number"
                               id="gradoDiversidadFuncional"
                               class="form-control"
                               th:field="*{gradoDiversidadFuncional}"
                               min="0"
                               max="100"
                               placeholder="Ej. 45">
                        <div class="text-muted-small mt-2">
                            Introduce un valor entre 0 y 100.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Grado de dependencia</label>
                        <input type="number" class="form-control"
                               th:field="*{gradoDependencia}"
                               min="1" max="3">
                    </div>

                    <div class="col-md-6">
                        <label class="data-label" for="centroSocialReferencia">
                            Centro social de referencia
                        </label>
                        <input type="text"
                               id="centroSocialReferencia"
                               class="form-control"
                               th:field="*{centroSocialReferencia}"
                               placeholder="Nombre del centro social">
                    </div>

                    <div class="col-md-6">
                        <label class="data-label" for="urlProyectoDeVida">
                            URL del proyecto de vida
                        </label>
                        <input type="url"
                               id="urlProyectoDeVida"
                               class="form-control"
                               th:field="*{urlProyectoDeVida}"
                               placeholder="https://...">
                    </div>
                </div>
            </div>

            <!-- SOLICITUD -->
            <div class="block-card">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <div class="block-title mb-0">Motivación de la solicitud</div>
                    <span class="role-badge">Solicitud</span>
                </div>

                <div class="row g-4">
                    <div class="col-12">
                        <label class="data-label" for="mensajeSolicitud">
                            Motivos de la solicitud
                        </label>
                        <textarea id="mensajeSolicitud"
                                  name="mensajeSolicitud"
                                  class="form-control"
                                  placeholder="Explica brevemente por qué solicitas este rol..."
                                  th:text="${solicitud.mensajeSolicitud}"></textarea>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">
                    Continuar con diversidades funcionales
                </button>

                <a th:href="@{/}"
                   class="btn btn-secondary">
                    Volver al inicio
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
