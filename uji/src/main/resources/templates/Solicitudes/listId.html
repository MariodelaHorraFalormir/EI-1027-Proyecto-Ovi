<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Gestionar Personas</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <!-- Pongo aqui el estilo temporalmente para poder trabajar con ello  -->
    <style>
        .tabla-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 70vh;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .tabla-personas {
            min-width: 1400px;
            margin-bottom: 0;
        }

        .tabla-personas thead th {
            position: sticky;
            top: 0;
            background: white;
            z-index: 2;
        }

        .no-wrap {
            white-space: nowrap;
        }

        .col-mail {
            min-width: 220px;
        }

        .col-direccion {
            min-width: 180px;
        }

        .col-apellidos {
            min-width: 170px;
        }
    </style>
</head>
<body>
<main class="container-fluid mt-4 px-4">
    <h1>Personas registradas por ID</h1>

    <div class="tabla-wrapper mt-3">
        <table class="table table-striped table-hover align-middle tabla-personas">
            <thead>
            <tr>
                <th class="no-wrap">ID</th>
                <th class="no-wrap col-mail">Categoria</th>
                <th class="no-wrap">Tipo</th>
                <th class="no-wrap" >estado</th>
                <th class="no-wrap">tecnicoRevisor</th>
                <th class="fecha Creacion">fecha Creacion</th>
                <th class="fecha Resolucion">fecha Resolucion</th>
                <th class="no-wrap">Detalles</th>
                <th class="no-wrap">Aprobar</th>
                <th class="no-wrap">Rechazar</th>
                <th class="no-wrap">Editar</th>
                <th class="no-wrap">Borrar</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="solicitud : ${solicitudes}">
                <td th:text="${solicitud.idSolicitud}"></td>
                <td class="no-wrap" th:text="${solicitud.categoriaSolicitud}"></td>
                <td th:text="${solicitud.tipoSolicitud}"></td>
                <td th:text="${solicitud.estadoSolicitud}"></td>
                <td th:text="${solicitud.tecnicoRevisor != null ? solicitud.tecnicoRevisor : '-'}"></td>
                <td class="no-wrap"
                    th:text="${solicitud.fechaCreacion != null ? #temporals.format(solicitud.fechaCreacion, 'dd/MM/yyyy') : '-'}">
                </td>

                <td class="no-wrap"
                    th:text="${solicitud.fechaResolucion != null ? #temporals.format(solicitud.fechaResolucion, 'dd/MM/yyyy') : '-'}">
                </td>
                <td class="no-wrap">
                    <a th:href="@{/Solicitudes/detail/{id}(id=${solicitud.idSolicitud})}"
                       class="btn btn-info btn-sm">
                        Ver detalles
                    </a>
                </td>
                <td class="no-wrap">
                    <form th:action="@{/Solicitudes/aprobarRapido/{id}(id=${solicitud.idSolicitud})}"
                          method="post"
                          class="d-inline">
                        <button type="submit" class="btn btn-success btn-sm">
                            Aprobar rápido
                        </button>
                    </form>
                </td>
                <td class="no-wrap">
                    <form th:action="@{/Solicitudes/rechazarRapido/{id}(id=${solicitud.idSolicitud})}"
                          method="post"
                          class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm">
                            Rechazar Rapido
                        </button>
                    </form>
                </td>

                <td class="no-wrap">
                    <a th:href="@{/Solicitudes/update/{id}(id=${solicitud.idSolicitud})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>
                </td>
                <td class="no-wrap">
                    <a th:href="@{/Solicitudes/delete/{id}(id=${solicitud.idSolicitud})}"
                       class="btn btn-danger btn-sm">
                        Borrar
                    </a>
                </td>

            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <a href="/" class="btn btn-secondary">Tornar</a>
    </div>
</main>
</body>
</html>
